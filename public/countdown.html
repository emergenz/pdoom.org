<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Internal launch page. Do not link from the public site, and keep it
         out of search engines and crawlers. The URL is the only gate. -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="no-referrer">
    <title>Launch · p(doom)</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="colors_and_type.css">
    <link rel="stylesheet" href="marketing.css">
    <style>
        /* Full-bleed void surface: the countdown stands alone, no nav. */
        body[data-surface="void"] {
            background: var(--void);
            color: var(--fg1);
        }

        .countdown-page {
            flex: 1 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--s-9) var(--s-6) var(--s-8);
            gap: var(--s-7);
        }

        .countdown-mark {
            display: inline-flex;
            align-items: center;
            gap: var(--s-3);
        }
        .countdown-mark .eyebrow { color: var(--fg3); }
        .countdown-rec {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-family: var(--font-mono);
            font-size: var(--fs-eyebrow);
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ember);
        }
        .countdown-rec-dot {
            width: 7px;
            height: 7px;
            border-radius: var(--r-pill);
            background: var(--ember);
            animation: pulse 1.8s var(--ease-ink) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        .countdown-head .lede {
            margin: var(--s-4) auto 0;
            color: var(--fg2);
            max-width: 46ch;
        }

        /* The clock: four mono, tabular figures separated by hairlines. */
        .clock {
            display: flex;
            align-items: stretch;
            gap: 0;
            border: 1px solid var(--rule);
            background: var(--bg2);
        }
        .clock-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--s-2);
            padding: var(--s-6) var(--s-6) var(--s-5);
            min-width: 132px;
        }
        .clock-unit + .clock-unit { border-left: 1px solid var(--rule); }
        .clock-value {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            font-size: clamp(48px, 9vw, 88px);
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--fg1);
        }
        .clock-label {
            font-family: var(--font-mono);
            font-size: var(--fs-eyebrow);
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--fg-dim);
        }

        .countdown-foot {
            font-family: var(--font-mono);
            font-size: var(--fs-caption);
            letter-spacing: 0.02em;
            color: var(--fg3);
        }
        .countdown-foot .wm-ink {
            color: var(--ember);
            font-style: normal;
        }

        /* Shown once the target has passed. */
        .countdown-live {
            display: none;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: var(--fs-h3);
            color: var(--ember);
        }
        body.is-live .clock { display: none; }
        body.is-live .countdown-live { display: block; }

        @media (max-width: 720px) {
            .clock { flex-wrap: wrap; }
            .clock-unit { flex: 1 1 50%; min-width: 0; }
            /* Re-draw hairlines for the 2x2 wrap. */
            .clock-unit + .clock-unit { border-left: 1px solid var(--rule); }
            .clock-unit:nth-child(odd) { border-left: 0; }
            .clock-unit:nth-child(n+3) { border-top: 1px solid var(--rule); }
        }
        @media (prefers-reduced-motion: reduce) {
            .countdown-rec-dot { animation: none; }
        }
    </style>
</head>
<body data-surface="void">
    <main class="countdown-page">
        <div class="countdown-mark">
            <span class="eyebrow">Internal · Model launch</span>
            <span class="countdown-rec" aria-hidden="true">
                <span class="countdown-rec-dot"></span>Live soon
            </span>
        </div>

        <div class="clock" id="clock" role="timer" aria-live="polite" aria-label="Time until launch">
            <div class="clock-unit">
                <span class="clock-value tnum" id="d">00</span>
                <span class="clock-label">Days</span>
            </div>
            <div class="clock-unit">
                <span class="clock-value tnum" id="h">00</span>
                <span class="clock-label">Hours</span>
            </div>
            <div class="clock-unit">
                <span class="clock-value tnum" id="m">00</span>
                <span class="clock-label">Minutes</span>
            </div>
            <div class="clock-unit">
                <span class="clock-value tnum" id="s">00</span>
                <span class="clock-label">Seconds</span>
            </div>
        </div>
        <p class="countdown-live">The model is live.</p>

        <div class="countdown-head">
            <p class="lede">The model goes live July 31, 2026 at 23:59 CEST.</p>
        </div>

        <p class="countdown-foot">
            <span class="wm-ink">p(doom)</span> · launch dispatch
        </p>
    </main>

    <script>
      // Anchor to a fixed instant so the countdown reads the same from any
      // timezone: 2026-07-31 23:59 CEST (UTC+02:00).
      (function () {
        var target = new Date('2026-07-31T23:59:00+02:00').getTime();
        var el = {
          d: document.getElementById('d'),
          h: document.getElementById('h'),
          m: document.getElementById('m'),
          s: document.getElementById('s')
        };

        function pad(n) { return (n < 10 ? '0' : '') + n; }

        function tick() {
          var diff = target - Date.now();
          if (diff <= 0) {
            document.body.classList.add('is-live');
            el.d.textContent = el.h.textContent = el.m.textContent = el.s.textContent = '00';
            return false;
          }
          var sec = Math.floor(diff / 1000);
          el.d.textContent = pad(Math.floor(sec / 86400));
          el.h.textContent = pad(Math.floor(sec / 3600) % 24);
          el.m.textContent = pad(Math.floor(sec / 60) % 60);
          el.s.textContent = pad(sec % 60);
          return true;
        }

        if (tick()) {
          var timer = setInterval(function () {
            if (!tick()) clearInterval(timer);
          }, 1000);
        }
      })();
    </script>
</body>
</html>
