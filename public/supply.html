<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Supply — p(doom)</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="colors_and_type.css">
    <link rel="stylesheet" href="marketing.css">
    <style>
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--s-9) var(--s-7) var(--s-10);
        }
        .page .section-mark {
            margin-bottom: var(--s-8);
        }
        .page h1 {
            font-size: var(--fs-h1);
            margin: 0 0 var(--s-9);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--s-7);
        }

        .product-card {
            background: none;
            border: 0;
            padding: 0;
            color: inherit;
            text-align: left;
            cursor: pointer;
            font: inherit;
            transition: color var(--dur-fast) var(--ease-ink);
        }
        .product-card:focus-visible {
            outline: 2px solid var(--ember);
            outline-offset: 8px;
        }

        .product-card-image {
            position: relative;
            background: var(--ash-100);
            border: 1px solid var(--ash-300);
            padding: 8px;
            aspect-ratio: 1 / 1;
            margin-bottom: var(--s-4);
            box-sizing: border-box;
            overflow: hidden;
        }
        .product-card-image::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid var(--ash-300);
            pointer-events: none;
            z-index: 1;
        }
        .product-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .product-card-image .default-img {
            transition: opacity var(--dur-base) var(--ease-ink);
        }
        .product-card-image .hover-img {
            position: absolute;
            inset: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
            opacity: 0;
            transition: opacity var(--dur-base) var(--ease-ink);
        }
        .product-card:hover .default-img,
        .product-card:focus-visible .default-img {
            opacity: 0;
        }
        .product-card:hover .hover-img,
        .product-card:focus-visible .hover-img {
            opacity: 1;
        }

        .product-card-info {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--s-3);
            padding-top: var(--s-3);
            border-top: 1px solid var(--ash-300);
        }
        .product-card-info h3 {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 18px;
            line-height: 1.2;
            letter-spacing: -.01em;
            color: var(--ink);
            margin: 0;
            transition: color var(--dur-fast) var(--ease-ink);
        }
        .product-card:hover h3 { color: var(--ember); }
        .product-price {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--ash-600);
            white-space: nowrap;
        }

        /* Wiggle */
        @keyframes wiggle {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-1.4deg); }
            75% { transform: rotate(1.4deg); }
        }
        .product-card.wiggle .product-card-image {
            animation: wiggle 0.6s var(--ease-ink);
        }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 11, 12, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: var(--s-6);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--paper);
            border: 1px solid var(--ash-300);
            max-width: 720px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: var(--s-7);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: var(--s-5);
        }
        .modal-close {
            position: absolute;
            top: var(--s-4);
            right: var(--s-4);
            width: 36px;
            height: 36px;
            background: none;
            border: 1px solid var(--ash-300);
            font-family: var(--font-mono);
            font-size: 16px;
            color: var(--ash-700);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--dur-fast) var(--ease-ink),
                        border-color var(--dur-fast) var(--ease-ink);
        }
        .modal-close:hover {
            color: var(--ember);
            border-color: var(--ember);
        }
        .modal-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--s-4);
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: -.01em;
            color: var(--ink);
            margin: 0;
            padding-right: 48px;
            border-bottom: 1px solid var(--ash-300);
            padding-bottom: var(--s-4);
        }
        .modal-price {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--ash-600);
        }
        .modal-main-image {
            background: var(--ash-100);
            border: 1px solid var(--ash-300);
            padding: 8px;
            position: relative;
        }
        .modal-main-image::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid var(--ash-300);
            pointer-events: none;
            z-index: 1;
        }
        .modal-main-image img {
            width: 100%;
            display: block;
        }
        .modal-thumbnails {
            display: flex;
            gap: var(--s-3);
            flex-wrap: wrap;
        }
        .modal-thumbnails button {
            background: var(--ash-100);
            border: 1px solid var(--ash-300);
            padding: 4px;
            width: 72px;
            height: 72px;
            cursor: pointer;
            transition: border-color var(--dur-fast) var(--ease-ink);
        }
        .modal-thumbnails button:hover { border-color: var(--ash-500); }
        .modal-thumbnails button.active { border-color: var(--ember); }
        .modal-thumbnails button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 960px) {
            .page { padding: var(--s-8) var(--s-6) var(--s-9); }
            .page h1 { font-size: 44px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: var(--s-6); }
        }
        @media (max-width: 600px) {
            .page { padding: var(--s-7) var(--s-5) var(--s-8); }
            .page h1 { font-size: 36px; }
            .product-grid { grid-template-columns: 1fr; max-width: 360px; margin: 0 auto; }
            .modal { padding: var(--s-6); }
            .modal-title { font-size: 22px; padding-right: 40px; flex-direction: column; align-items: flex-start; gap: var(--s-2); }
        }
        @media (prefers-reduced-motion: reduce) {
            .product-card,
            .product-card-image,
            .product-card-image .default-img,
            .product-card-image .hover-img { transition: none; }
            .product-card.wiggle .product-card-image { animation: none; }
        }
    </style>
</head>
<body>
    <header class="site-header" data-surface="void">
        <div class="container">
            <nav class="nav">
                <a class="brand" href="/">
                    <img class="sigil-img" src="logo-mark-inverted.png" alt="">
                    <span class="wm">p(doom)</span>
                </a>
                <div class="nav-links">
                    <a href="/blog.html">Research</a>
                    <a href="/about.html">About</a>
                    <a href="/supply.html">Supply</a>
                    <a href="https://discord.gg/G4JNuPX2VR">Join</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <article class="page">
            <header class="section-mark">
                <span class="eyebrow">§ Supply</span>
            </header>
            <h1>For the hands that build it.</h1>

            <div class="product-grid">
                <button type="button" class="product-card" data-product="shirt1" aria-label="View Meta-learner">
                    <div class="product-card-image">
                        <img class="default-img" src="supply/shirt1-front.webp" alt="Meta-learner tee, front">
                        <img class="hover-img" src="supply/shirt1-back.webp" alt="Meta-learner tee, back" loading="lazy">
                    </div>
                    <div class="product-card-info">
                        <h3>Meta-learner</h3>
                        <span class="product-price">€15</span>
                    </div>
                </button>

                <button type="button" class="product-card" data-product="shirt2" aria-label="View Fixed-size state">
                    <div class="product-card-image">
                        <img class="default-img" src="supply/shirt2-front.webp" alt="Fixed-size state tee, front">
                        <img class="hover-img" src="supply/shirt2-back.webp" alt="Fixed-size state tee, back" loading="lazy">
                    </div>
                    <div class="product-card-info">
                        <h3>Fixed-size state</h3>
                        <span class="product-price">€15</span>
                    </div>
                </button>

                <button type="button" class="product-card" data-product="hat" aria-label="View Corduroy Hat">
                    <div class="product-card-image">
                        <img class="default-img" src="supply/hat-side.webp" alt="Corduroy hat, side">
                        <img class="hover-img" src="supply/hat-front.webp" alt="Corduroy hat, front" loading="lazy">
                    </div>
                    <div class="product-card-info">
                        <h3>Corduroy Hat</h3>
                        <span class="product-price">€20</span>
                    </div>
                </button>

                <button type="button" class="product-card" data-product="beanie" aria-label="View Ribbed Beanie">
                    <div class="product-card-image">
                        <img class="default-img" src="supply/beanie-front.webp" alt="Ribbed beanie, front">
                        <img class="hover-img" src="supply/beanie-detail.webp" alt="Ribbed beanie, detail" loading="lazy">
                    </div>
                    <div class="product-card-info">
                        <h3>Ribbed Beanie</h3>
                        <span class="product-price">€20</span>
                    </div>
                </button>
            </div>
        </article>
    </main>

    <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal">
            <button type="button" class="modal-close" id="modal-close" aria-label="Close">×</button>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-main-image">
                <img id="modal-img" src="" alt="">
            </div>
            <div class="modal-thumbnails" id="modal-thumbs"></div>
        </div>
    </div>

    <footer class="site-footer" data-surface="void">
        <div class="container">
            <div class="footer-row">
                <a class="brand" href="/">
                    <img class="sigil-img" src="logo-mark-inverted.png" alt="">
                    <span class="wm">p(doom)</span>
                </a>
                <nav class="footer-links">
                    <a href="https://github.com/p-doom/">GitHub</a>
                    <a href="https://discord.gg/G4JNuPX2VR">Discord</a>
                    <a href="https://x.com/@prob_doom">Twitter</a>
                    <a href="https://www.linkedin.com/company/p-doom">LinkedIn</a>
                    <a href="https://huggingface.co/p-doom">HuggingFace</a>
                    <a href="/imprint.html">Imprint</a>
                </nav>
            </div>
        </div>
    </footer>

    <script>
        const products = {
            shirt1: {
                title: 'Meta-learner',
                price: '€15',
                images: [
                    { src: 'supply/shirt1-front.webp', alt: 'Front' },
                    { src: 'supply/shirt1-back.webp', alt: 'Back' },
                    { src: 'supply/shirt1-combo.webp', alt: 'Front & Back' },
                ],
            },
            shirt2: {
                title: 'Fixed-size state',
                price: '€15',
                images: [
                    { src: 'supply/shirt2-front.webp', alt: 'Front' },
                    { src: 'supply/shirt2-back.webp', alt: 'Back' },
                    { src: 'supply/shirt2-combo.webp', alt: 'Front & Back' },
                ],
            },
            hat: {
                title: 'Corduroy Hat',
                price: '€20',
                images: [
                    { src: 'supply/hat-side.webp', alt: 'Side' },
                    { src: 'supply/hat-front.webp', alt: 'Front' },
                    { src: 'supply/hat-back.webp', alt: 'Back' },
                    { src: 'supply/hat-detail.webp', alt: 'Detail' },
                ],
            },
            beanie: {
                title: 'Ribbed Beanie',
                price: '€20',
                images: [
                    { src: 'supply/beanie-front.webp', alt: 'Front' },
                    { src: 'supply/beanie-detail.webp', alt: 'Detail' },
                ],
            },
        };

        const overlay = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalThumbs = document.getElementById('modal-thumbs');
        const modalTitle = document.getElementById('modal-title');
        const closeButton = document.getElementById('modal-close');
        let activeTrigger = null;

        function openModal(productId, trigger) {
            const p = products[productId];
            if (!p) return;

            activeTrigger = trigger || document.activeElement;

            modalTitle.textContent = '';
            modalTitle.appendChild(document.createTextNode(p.title));
            const price = document.createElement('span');
            price.className = 'modal-price';
            price.textContent = p.price;
            modalTitle.appendChild(price);

            modalImg.src = p.images[0].src;
            modalImg.alt = p.title + ' — ' + p.images[0].alt;

            modalThumbs.textContent = '';
            p.images.forEach((img, i) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.setAttribute('aria-label', img.alt);
                const thumbImg = document.createElement('img');
                thumbImg.src = img.src;
                thumbImg.alt = img.alt;
                btn.appendChild(thumbImg);
                if (i === 0) btn.classList.add('active');
                btn.addEventListener('click', () => {
                    modalImg.src = img.src;
                    modalImg.alt = p.title + ' — ' + img.alt;
                    modalThumbs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                modalThumbs.appendChild(btn);
            });

            overlay.classList.add('active');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            closeButton.focus();
        }

        function closeModal() {
            overlay.classList.remove('active');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            if (activeTrigger) activeTrigger.focus();
            activeTrigger = null;
        }

        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', () => openModal(card.dataset.product, card));
        });

        closeButton.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        const cards = document.querySelectorAll('.product-card');
        const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        function triggerWiggle() {
            const card = cards[Math.floor(Math.random() * cards.length)];
            card.classList.add('wiggle');
            card.addEventListener('animationend', () => card.classList.remove('wiggle'), { once: true });
        }
        if (!prefersReducedMotion && cards.length) {
            setInterval(triggerWiggle, 4000);
            setTimeout(triggerWiggle, 1500);
        }
    </script>
</body>
</html>
